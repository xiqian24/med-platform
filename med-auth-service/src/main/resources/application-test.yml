spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
  config:
    import: ""
  autoconfigure:
    exclude:
      - org.springframework.cloud.config.client.ConfigServerAutoConfiguration
eureka:
  client:
    enabled: false
